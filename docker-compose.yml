version: "3.8"

services:
  client:
    image: btsearch-client:${COMMIT_SHA}
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3030/api/v1}
        - VITE_MAPBOX_ACCESS_TOKEN=${VITE_MAPBOX_ACCESS_TOKEN:-}
        - VITE_VAPID_PUBLIC_KEY=${VITE_VAPID_PUBLIC_KEY:-}
        - VITE_APP_NAME=${VITE_APP_NAME:-OpenBTS}
        - VITE_ADSENSE_CLIENT=${VITE_ADSENSE_CLIENT:-}
        - COMMIT_SHA=${COMMIT_SHA}
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - server
    restart: unless-stopped

  server:
    image: btsearch-server:${COMMIT_SHA}
    build:
      context: .
      dockerfile: apps/server/docker/Dockerfile
    ports:
      - "127.0.0.1:3031-3034:3031-3034"
    environment:
      # Database
      - DATABASE_URL=postgres://user:password@pgbouncer:6432/openbts
      - REDIS_URL=redis://redis:6379
      # Authentication
      - BETTER_AUTH_SECRET=your-generated-secret
      - GOOGLE_CLIENT_ID=your-google-client-id
      - GOOGLE_CLIENT_SECRET=your-google-client-secret
      - GITHUB_CLIENT_ID=your-github-client-id
      - GITHUB_CLIENT_SECRET=your-github-client-secret
      - BASE_URL=http://localhost:3030
      # App configuration
      - APP_NAME=OpenBTS
      - WORKERS=4 # Number of server workers, since javascript is single-threaded, this will improve performance of the server
      # Resend (email)
      - RESEND_API_KEY=
      - RESEND_FROM=noreply@openbts.sakilabs.com
      # AXIOM HQ logging
      - AXIOM_TOKEN=
      - AXIOM_DATASET=openbts
      - NTM_USERAGENT=
    volumes:
      - uploads-volume:/app/uploads
    depends_on:
      - postgres
      - redis
      - pgbouncer
    restart: unless-stopped

  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    environment:
      # Initial database setup, you can remove it after the first run
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=openbts
    volumes:
      - postgres-volume:/var/lib/postgresql/18/docker
    restart: unless-stopped

  pgbouncer:
    image: dhi.io/pgbouncer:1.25
    depends_on:
      - postgres
    ports:
      - "0.0.0.0:6432:6432"
      - "[::]:6432:6432"
    volumes:
      - ./docker/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    restart: unless-stopped

  redis:
    image: redis:alpine
    command: redis-server --save 60 1 --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-volume:/data
    restart: unless-stopped

volumes:
  postgres-volume:
  uploads-volume:
  redis-volume:
