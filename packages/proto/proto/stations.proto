syntax = "proto3";
import "common.proto";
import "station_cells.proto";
import "locations.proto";
import "google/protobuf/struct.proto";
package openbts.stations;

message StationCell {
  int32 id = 1;
  Rat rat = 2;
  string notes = 3;
  Band band = 4;
  bool is_confirmed = 5;
  google.protobuf.Struct details = 6;
  int32 sector_id = 7;

  string updatedAt = 8;
  string createdAt = 9;
}

enum NRType {
  NR_TYPE_UNKNOWN = 0;
  nsa = 1;
  sa = 2;
}

message Cell {
  int32 id = 1;
  int32 station_id = 2;
  Rat rat = 3;
  string notes = 4;
  Band band = 5;
  bool is_confirmed = 6;
  google.protobuf.Struct details = 7;
  int32 sector_id = 8;

  string updatedAt = 9;
  string createdAt = 10;
}

message Station {
  int32 id = 1;
  string station_id = 2;
  string notes = 3;
  string extra_address = 4;
  repeated StationCell cells = 5;
  ExtraIdentificators extra_identificators = 6;
  openbts.locations.Location location = 7;
  Operator operator = 8;
  bool is_confirmed = 9;
  repeated openbts.locations.Sector sectors = 10;

  string updatedAt = 11;
  string createdAt = 12;
  optional string status = 13;
}

message StationsResponse {
  repeated Station data = 1;
  int32 totalCount = 2;
}

message StationResponse {
  Station data = 1;
}

message CellsResponse {
  repeated Cell data = 1;
}

message CellResponse {
  Cell data = 1;
}
