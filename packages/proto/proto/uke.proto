syntax = "proto3";
import "common.proto";
import "locations.proto";
package openbts.uke;

message UKEOperator {
  int32 id = 1;
  string name = 2;
  string full_name = 3;
}

enum DecisionType {
  P = 0;
  zmP = 1;
}

enum PermitSource {
  permits = 0;
  device_registry = 1;
}

enum AntennaType {
  indoor = 0;
  outdoor = 1;
}

message Sector {
  int32 id = 1;
  int32 azimuth = 2;
  int32 elevation = 3;
  int32 antenna_height = 4;
  AntennaType antenna_type = 5;
}

message Permit {
  int32 id = 1;
  string station_id = 2;
  string decision_number = 3;
  DecisionType decision_type = 4;
  string expiry_date = 5;
  PermitSource source = 6;
  openbts.locations.Location location = 7;
  Operator operator = 8;
  Band band = 9;
  repeated Sector sectors = 10;

  string updatedAt = 11;
  string createdAt = 12;
}

message UKELocation {
  int32 id = 1;
  string city = 2;
  string address = 3;
  double latitude = 4;
  double longitude = 5;
  Region region = 6;
  repeated Permit permits = 7;

  string updatedAt = 8;
  string createdAt = 9;
}

message RadiolineManufacturer {
  int32 id = 1;
  string name = 2;
}

message EquipmentType {
  int32 id = 1;
  string name = 2;
  RadiolineManufacturer manufacturer = 3;
}

message RadiolineAtenna {
  EquipmentType type = 1;
  int32 gain = 2;
  int32 height = 3;
}

message RadiolineTxTransmitter {
  EquipmentType type = 1;
}

message RadiolineTx {
  double longitude = 1;
  double latitude = 2;
  int32 height = 3;
  int32 eirp = 4;
  int32 antenna_attenuation = 5;
  RadiolineTxTransmitter transmitter = 6;
  RadiolineAtenna antenna = 7;
}

message RadiolineRx {
  double longitude = 1;
  double latitude = 2;
  int32 height = 3;
  EquipmentType type = 4;
  int32 gain = 5;
  int32 height_antenna = 6;
  int32 noise_figure = 7;
  int32 atpc_attenuation = 8;
}

message RadiolineLink {
  int32 freq = 1;
  int32 ch_num = 2;
  string plan_synbol = 3;
  int32 ch_width = 4;
  string polarization = 5;
  string modulation_type = 6;
  string bandwidth = 7;
}

message RadiolinePermit {
  string number = 1;
  string decision_type = 2;
  string expiry_date = 3;
}

message Radioline {
  int32 id = 1;
  RadiolineTx tx = 2;
  RadiolineRx rx = 3;
  RadiolineLink link = 4;
  UKEOperator operator = 5;
  RadiolinePermit permit = 6;

  string updatedAt = 7;
  string createdAt = 8;
}

message PermitsResponse {
  repeated Permit data = 1;
}

message PermitResponse {
  Permit data = 1;
}

message LocationsResponse {
  repeated UKELocation data = 1;
  int32 totalCount = 2;
}

message RadiolinesResponse {
  repeated Radioline data = 1;
  int32 totalCount = 3;
}

message RadiolineResponse {
  Radioline data = 1;
}
