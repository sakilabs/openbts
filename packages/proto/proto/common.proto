syntax = "proto3";
package openbts;


enum StationStatus {
  STATION_STATUS_UNKNOWN = 0;
  published = 1;
  inactive = 2;
  pending = 3;
}

message Operator {
  int32 id = 1;
  string name = 2;
  string full_name = 3;
  int32 parent_id = 4;
  int32 mnc = 5;
}

message Region {
  int32 id = 1;
  string name = 2;
  string code = 3;
}

enum Rat {
  RAT_UNKNOWN = 0;
  GSM = 1;
  CDMA = 2;
  UMTS = 3;
  LTE = 4;
  NR = 5;
  IOT = 6;
}

enum Duplex {
  DUPLEX_UNKNOWN = 0;
  FDD = 1;
  TDD = 2;
}

enum BandVariant {
  BAND_VARIANT_UNKNOWN = 0;
  commercial = 1;
  railway = 2;
}

message Band {
  int32 id = 1;
  int32 value = 2;
  Rat rat = 3;
  string name = 4;
  Duplex duplex = 5;
  BandVariant variant = 6;
}
