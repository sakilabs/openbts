syntax = "proto3";
import "google/protobuf/timestamp.proto";
import "common.proto";
import "stations.proto";
package openbts.locations;

message LocationStation {
  int32 id = 1;
  string station_id = 2;
  string notes = 3;
  string extra_address = 4;
  string updatedAt = 5;
  string createdAt = 6;
  bool is_confirmed = 7;
  StationStatus status = 8;
  Operator operator = 9;
  repeated openbts.stations.CellWithoutDetails cells = 10;
  openbts.stations.ExtraIdentificators extra_identificators = 11;
}

message Location {
  int32 id = 1;
  string city = 2;
  string address = 3;
  double latitude = 4;
  double longitude = 5;
  string updatedAt = 6;
  string createdAt = 7;
  Region region = 8;
  repeated LocationStation stations = 9;
}

message LocationsResponse {
  repeated Location data = 1;
  int32 totalCount = 2;
}

message LocationResponse {
  Location data = 1;
}
