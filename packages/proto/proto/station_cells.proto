syntax = "proto3";
import "common.proto";
package openbts.stations;

message CellWithoutDetails {
  int32 id = 1;
  int32 station_id = 2;
  Rat rat = 3;
  string notes = 4;
  Band band = 5;
  bool is_confirmed = 6;
  int32 sector_id = 7;

  string updatedAt = 8;
  string createdAt = 9;
}

message ExtraIdentificators {
  int32 id = 1;
  int32 networks_id = 2;
  string networks_name = 3;
  string mno_name = 4;

  string updatedAt = 5;
  string createdAt = 6;
}
