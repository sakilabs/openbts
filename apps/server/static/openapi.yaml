openapi: 3.0.3
info:
  title: OpenBTS API
  description: |
    API for OpenBTS Backend
    Last updated: 2026-07-01
  version: 1.1.0

servers:
  - url: https://openbts.sakilabs.com/api/v1
    description: API v1 base path

tags:
  - name: Health
  - name: Settings
  - name: Stats
  - name: Cells
  - name: Stations
  - name: Operators
  - name: Bands
  - name: Regions
  - name: Hunters
  - name: Locations
  - name: Submissions
  - name: Notifications
  - name: Deleted Entries
  - name: Analyzer
  - name: Search
  - name: Audit Logs
  - name: UKE
  - name: Lists
  - name: Comments
  - name: PEM
  - name: KMZ

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [status, timestamp]
                    properties:
                      status: { type: string, example: ok }
                      timestamp: { type: string, format: date-time }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /settings:
    get:
      tags: [Settings]
      summary: Get runtime settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/RuntimeSettings"
        "500": { $ref: "#/components/responses/InternalServerError" }
    patch:
      tags: [Settings]
      summary: Update runtime settings
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeSettingsPatch"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/RuntimeSettings" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stats:
    get:
      tags: [Stats]
      summary: Get database and import statistics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [lastUpdated, counts]
                    properties:
                      lastUpdated:
                        type: object
                        properties:
                          stations: { type: string, format: date-time, nullable: true }
                          stations_permits: { type: string, format: date-time, nullable: true }
                          radiolines: { type: string, format: date-time, nullable: true }
                      counts:
                        type: object
                        properties:
                          locations: { type: integer }
                          stations: { type: integer }
                          cells: { type: integer }
                          uke_locations: { type: integer }
                          uke_permits: { type: integer }
                          uke_radiolines: { type: integer }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stats/summary:
    get:
      tags: [Stats]
      summary: Get summary statistics by RAT and operator
      parameters:
        - name: operator_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [total_permits, total_unique_stations, by_rat, by_operator, internal]
                    properties:
                      total_permits: { type: integer }
                      total_unique_stations: { type: integer }
                      by_rat:
                        type: array
                        items: { $ref: "#/components/schemas/StatsByRat" }
                      by_operator:
                        type: array
                        items: { $ref: "#/components/schemas/StatsByOperator" }
                      internal: { $ref: "#/components/schemas/InternalSummary" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stats/permits:
    get:
      tags: [Stats]
      summary: Get permits statistics by band and operator
      parameters:
        - name: operator_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [uke, internal]
                    properties:
                      uke:
                        type: array
                        items: { $ref: "#/components/schemas/PermitsByBandUKE" }
                      internal:
                        type: array
                        items: { $ref: "#/components/schemas/PermitsByBandInternal" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stats/permits/snapshot:
    get:
      tags: [Stats]
      summary: Get latest permit snapshot for a month
      parameters:
        - name: month
          in: query
          required: true
          schema: { type: string, pattern: "^\\d{4}-\\d{2}$" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/PermitSnapshot" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stats/permits/history:
    get:
      tags: [Stats]
      summary: Get permits history over time
      parameters:
        - name: operator_id
          in: query
          schema: { type: integer }
        - name: band_id
          in: query
          schema: { type: integer }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: granularity
          in: query
          schema: { type: string, enum: [daily, monthly], default: monthly }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/PermitsHistoryRow" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stats/stations/history:
    get:
      tags: [Stats]
      summary: Get unique station counts per operator over time
      description: Returns unique station count per operator per snapshot date
      parameters:
        - name: operator_id
          in: query
          schema: { type: integer }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: granularity
          in: query
          schema: { type: string, enum: [daily, monthly], default: monthly }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/StationsHistoryRow" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stats/voivodeships:
    get:
      tags: [Stats]
      summary: Get statistics by voivodeship (region)
      parameters:
        - name: operator_id
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [uke, internal]
                    properties:
                      uke:
                        type: array
                        items: { $ref: "#/components/schemas/VoivodeshipUKE" }
                      internal:
                        type: array
                        items: { $ref: "#/components/schemas/VoivodeshipInternal" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /cells:
    get:
      tags: [Cells]
      summary: List cells
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 150 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/CellWithDetailsAndBand" } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      tags: [Cells]
      summary: Batch delete cells
      description: Deletes multiple cells by ID. Also updates the `updatedAt` timestamp on all affected stations
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items: { type: integer, minimum: 1 }
                  minItems: 1
      responses:
        "204": { description: No Content }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      tags: [Cells]
      summary: Create cell
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CellCreate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/CellWithDetails" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /cells/export:
    get:
      tags: [Cells]
      summary: Export cells in CLF/NTM/NetMonitor format
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: ["2.0", "2.1", "3.0-dec", "3.0-hex", "4.0", "ntm", "netmonitor"]
            default: "4.0"
        - name: operators
          in: query
          description: Comma-separated MNC numbers
          schema: { type: string }
        - name: regions
          in: query
          description: Comma-separated 3-letter region codes from /regions endpoint ("code" variable)
          schema: { type: string }
        - name: rat
          in: query
          description: Comma-separated RATs (GSM, UMTS, LTE, NR, IOT) - IOT selects cells with RedCap/IoT support
          schema: { type: string }
        - name: bands
          in: query
          description: Comma-separated band values (e.g. 900, 1800, 2100)
          schema: { type: string }
        - name: since
          in: query
          description: Only include cells updated on or after this date (YYYY-MM-DD)
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$", example: "2026-01-01" }
      responses:
        "200":
          description: Plain text export as a file (CLF, NTM, or CSV depending on format)
          content:
            text/plain: { schema: { type: string, format: binary } }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /cells/{id}:
    get:
      tags: [Cells]
      summary: Get cell by ID
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/CellWithStationBandDetails" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    patch:
      tags: [Cells]
      summary: Update cell
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CellUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/CellWithDetails" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      tags: [Cells]
      summary: Delete cell
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204": { description: No Content }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stations:
    get:
      tags: [Stations]
      summary: List stations
      parameters:
        - name: bounds
          in: query
          description: "bbox as lat1,lon1,lat2,lon2"
          schema: { type: string, pattern: "^-?\\d+\\.\\d+,-?\\d+\\.\\d+,-?\\d+\\.\\d+,-?\\d+\\.\\d+$" }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 150 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: rat
          in: query
          description: Comma-separated (cdma, umts, gsm, lte, nr, iot)
          schema: { type: string }
        - name: operators
          in: query
          description: Comma-separated MNC numbers
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: bands
          in: query
          description: Comma-separated band IDs
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: regions
          in: query
          description: Comma-separated 3-letter region codes
          schema: { type: string, pattern: "^[A-Z]{3}(,[A-Z]{3})*$" }
        - name: sort
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: sortBy
          in: query
          schema: { type: string, enum: [station_id, updatedAt, createdAt] }
        - name: status
          in: query
          description: "Comma-separated station statuses to include. Defaults to `published`"
          schema: { type: string, pattern: "^(?:published|pending|inactive)(?:,(?:published|pending|inactive))*$" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, totalCount]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/StationWithCells" } }
                  totalCount: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      tags: [Stations]
      summary: Create station with optional cells
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StationCreate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/StationWithCells" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stations/{id}:
    get:
      tags: [Stations]
      summary: Get station by ID
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/StationWithCells" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    patch:
      tags: [Stations]
      summary: Update station
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StationUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/StationRecord" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      tags: [Stations]
      summary: Delete station
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204": { description: No Content }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stations/{station_id}/cells:
    get:
      tags: [Stations]
      summary: List cells for a station
      parameters:
        - $ref: "#/components/parameters/StationIdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/CellWithDetailsAndBand" } }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      tags: [Stations]
      summary: Add cells to station
      parameters:
        - $ref: "#/components/parameters/StationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cells]
              properties:
                cells: { type: array, items: { $ref: "#/components/schemas/CellCreate" } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/CellWithDetails" } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    patch:
      tags: [Stations]
      summary: Update multiple cells on station
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cells]
              properties:
                cells:
                  type: array
                  minItems: 1
                  items: { $ref: "#/components/schemas/CellUpdateWithId" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/CellWithDetails" } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stations/{station_id}/cells/{cell_id}:
    get:
      tags: [Stations]
      summary: Get cell by ID for a station
      parameters:
        - $ref: "#/components/parameters/StationIdPath"
        - name: cell_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/CellWithDetailsAndBand" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    patch:
      tags: [Stations]
      summary: Update cell on station
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StationIdPath"
        - name: cell_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CellUpdate" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/CellWithDetails" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      tags: [Stations]
      summary: Delete cell from station
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StationIdPath"
        - name: cell_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: No Content }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /stations/{station_id}/sectors:
    get:
      tags: [Stations]
      summary: List sectors for a station
      parameters:
        - $ref: "#/components/parameters/StationIdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/StationSector" } }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    put:
      tags: [Stations]
      summary: Replace sectors for a station
      description: Replaces the station sector list. Existing sectors can be retained or updated by `id`; sectors omitted from the request are deleted only if no cells are assigned to them. The maximum number of sectors is the largest number of cells in any single band on the station
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - $ref: "#/components/parameters/StationIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sectors]
              properties:
                sectors:
                  type: array
                  items: { $ref: "#/components/schemas/StationSectorInput" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
