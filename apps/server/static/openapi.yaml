              type: array
              description: Included only when `?azimuths=true` is passed to `/uke/locations` endpoint
              items: { $ref: "#/components/schemas/UkePermitSector" }
    UkePermitWithBandOperatorLocation:
      allOf:
        - $ref: "#/components/schemas/UkePermitBase"
        - type: object
          properties:
            band: { $ref: "#/components/schemas/Band" }
            station: { $ref: "#/components/schemas/UkeStationWithOperatorLocation" }
            sectors: { type: array, items: { $ref: "#/components/schemas/UkePermitSector" } }
    UkePermitWithBand:
      allOf:
        - $ref: "#/components/schemas/UkePermitBase"
        - type: object
          properties:
            band:
              allOf:
                - $ref: "#/components/schemas/Band"
              nullable: true
            sectors: { type: array, items: { $ref: "#/components/schemas/UkePermitSector" } }
    UkePermitBase:
      type: object
