          properties:
            permits: { type: array, items: { $ref: "#/components/schemas/UkePermitWithBandOperator" } }
    UkeOperator:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        full_name: { type: string }
    UkeStation:
      type: object
      properties:
        id: { type: integer }
        station_id: { type: string }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
    UkeStationWithOperator:
      allOf:
        - $ref: "#/components/schemas/UkeStation"
        - type: object
          properties:
            operator:
              allOf:
                - $ref: "#/components/schemas/Operator"
              nullable: true
    UkeStationWithOperatorLocation:
      allOf:
        - $ref: "#/components/schemas/UkeStation"
        - type: object
          properties:
            operator: { $ref: "#/components/schemas/Operator" }
            location: { $ref: "#/components/schemas/UkeLocation" }
    UkeStationWithOptionalOperatorLocation:
      allOf:
        - $ref: "#/components/schemas/UkeStation"
        - type: object
          properties:
            operator:
              allOf:
                - $ref: "#/components/schemas/Operator"
              nullable: true
            location:
              allOf:
                - $ref: "#/components/schemas/UkeLocation"
              nullable: true
    UkeStationWithPermits:
      allOf:
        - $ref: "#/components/schemas/UkeStation"
        - type: object
          properties:
            operator: { $ref: "#/components/schemas/Operator" }
            location: { $ref: "#/components/schemas/UkeLocation" }
            permits: { type: array, items: { $ref: "#/components/schemas/UkePermitWithBand" } }
    UkeStationPermitAssociation:
      allOf:
        - $ref: "#/components/schemas/UkePermitBase"
        - type: object
          properties:
            band: { $ref: "#/components/schemas/Band" }
            station:
              allOf:
                - $ref: "#/components/schemas/UkeStationWithOperatorLocation"
              nullable: true
            sectors: { type: array, items: { $ref: "#/components/schemas/UkePermitSector" } }
    UkeSearchStation:
      type: object
      properties:
        id: { type: integer }
        station_id: { type: string }
