          in: query
          schema: { type: string, pattern: "^-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*$" }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 500 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: rat
          in: query
          schema: { type: string }
        - name: operators
          in: query
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: bands
          in: query
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: regions
          in: query
          schema: { type: string, pattern: "^[A-Z]{3}(,[A-Z]{3})*$" }
        - name: since
          in: query
          schema: { type: string, pattern: "^(createdAt|updatedAt)(?:,(createdAt|updatedAt))?:\\d+$" }
        - name: q
          in: query
          description: Advanced filters from POST /search or normal city and address search
          schema: { type: string, maxLength: 500 }
        - name: orphaned
          in: query
          schema: { type: boolean, default: false }
        - name: sort
          in: query
