          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: photo_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one field (note or taken_at) must be provided
              properties:
                note: { type: string, maxLength: 100 }
                taken_at: { type: string, format: date-time, nullable: true }
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      tags: [Submissions]
      summary: Delete a submission photo
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: photo_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204": { description: No Content }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /submissions/batch:
    post:
      tags: [Submissions]
      summary: Create a batch of submissions
      description: |
        Creates up to 25 submissions in a single atomic transaction. If any item fails validation the entire batch is rejected and no submissions are created.
        Each item must include at least 2 cell changes. A shared `submitter_note` can be provided at the top level and will be used for any item that does not supply its own note.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                submitter_note:
                  type: string
                  maxLength: 2000
                  nullable: true
                items:
                  type: array
                  minItems: 1
                  maxItems: 25
                  items: { $ref: "#/components/schemas/SubmissionCreateSingle" }
      responses:
        "200":
          description: All submissions created successfully
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/SubmissionCreateResponse" } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /submissions/cleanup:
    post:
      tags: [Submissions]
      summary: Clean up old submissions
      description: Deletes proposed data (cells, sectors, stations, locations) for submissions older than 1 month
      security:
        - CookieAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [cleaned]
                    properties:
                      cleaned: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /submissions/cleanup-photos:
    post:
      tags: [Submissions]
      summary: Clean up rejected submission photos
      description: Deletes attachment files and records for photos uploaded to rejected submissions that were never assigned to a station
      security:
        - CookieAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [deleted]
                    properties:
                      deleted: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the current user
      security:
        - CookieAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, totalUnread, total]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/Notification" } }
                  totalUnread: { type: integer }
                  total: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /notifications/read-all:
    put:
      tags: [Notifications]
      summary: Mark all notifications as read
      security:
        - CookieAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [updated]
                    properties:
                      updated: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /notifications/{id}/read:
    patch:
      tags: [Notifications]
      summary: Mark a single notification as read
      security:
        - CookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/Notification" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /deleted-entries:
    get:
      tags: [Deleted Entries]
      summary: List deleted entries
      parameters:
        - name: source_table
          in: query
          schema: { type: string, enum: [uke_permits, uke_radiolines] }
        - name: source_type
          in: query
          schema: { type: string, enum: [permits, device_registry, radiolines] }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, totalCount]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/DeletedEntry" }
                  totalCount: { type: integer }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /deleted-entries/summary:
    get:
      tags: [Deleted Entries]
      summary: Get summary of deleted entries
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [total_deleted, by_source, by_import]
                    properties:
                      total_deleted: { type: integer }
                      by_source:
                        type: array
                        items: { $ref: "#/components/schemas/DeletedEntriesBySource" }
                      by_import:
                        type: array
                        items: { $ref: "#/components/schemas/DeletedEntriesByImport" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /analyzer:
    post:
      tags: [Analyzer]
      summary: Analyze NTM/NetMonster log cells against the database
      description: Cross-references up to 20,000 parsed cell records against the internal station database. Returns a result for each input cell indicating whether it was found, probably matched, or not found
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cells]
              properties:
                cells:
                  type: array
                  minItems: 1
                  maxItems: 20000
                  items:
                    oneOf:
                      - type: object
                        required: [rat, mnc, lac, cid]
                        properties:
                          rat: { type: string, enum: [GSM] }
                          mnc: { type: integer, description: "Combined MCC+MNC (e.g. 26002)" }
                          lac: { type: integer, minimum: 0, maximum: 65535 }
                          cid: { type: integer, minimum: 0, maximum: 65535 }
                      - type: object
                        required: [rat, mnc, lac, cid, rnc]
                        properties:
                          rat: { type: string, enum: [UMTS] }
                          mnc: { type: integer, description: "Combined MCC+MNC (e.g. 26002)" }
                          lac: { type: integer, minimum: 0, maximum: 65535 }
                          cid: { type: integer, minimum: 0, maximum: 65535 }
                          rnc: { type: integer, minimum: 0, maximum: 65535, nullable: true }
                          uarfcn: { type: integer, minimum: 0, maximum: 16383 }
                      - type: object
                        required: [rat, mnc, tac, enbid, clid, pci]
                        properties:
                          rat: { type: string, enum: [LTE] }
                          mnc: { type: integer, description: "Combined MCC+MNC (e.g. 26002)" }
                          tac: { type: integer, minimum: 0, maximum: 65535 }
                          enbid: { type: integer, minimum: 0, maximum: 1048575 }
                          clid: { type: integer, minimum: 0, maximum: 255 }
                          pci: { type: integer, minimum: 0, maximum: 503 }
                          earfcn: { type: integer, minimum: 0, maximum: 262143 }
                      - type: object
                        required: [rat, mnc]
                        properties:
                          rat: { type: string, enum: [NR] }
                          mnc: { type: integer, description: "Combined MCC+MNC (e.g. 26002)" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required: [status, warnings]
                      properties:
                        status:
                          type: string
                          enum: [found, probable, not_found, unsupported]
                        warnings:
                          type: array
                          items:
                            {
                              type: string,
                              enum:
                                [lac_mismatch, rnc_mismatch, uarfcn_mismatch, tac_mismatch, pci_mismatch, pci_missing, earfcn_mismatch, enbid_only],
                            }
                        station:
                          $ref: "#/components/schemas/AnalyzerStation"
                        cell:
                          oneOf:
                            - type: object
                              required: [rat, lac, cid]
                              properties:
                                rat: { type: string, enum: [GSM] }
                                lac: { type: integer }
                                cid: { type: integer }
                            - type: object
                              required: [rat, rnc, cid]
                              properties:
                                rat: { type: string, enum: [UMTS] }
                                rnc: { type: integer, minimum: 0, maximum: 65535 }
                                cid: { type: integer, minimum: 0, maximum: 65535 }
                                lac: { type: integer, minimum: 0, maximum: 65535, nullable: true }
                                arfcn: { type: integer, minimum: 0, maximum: 16383, nullable: true }
                            - type: object
                              required: [rat, enbid]
                              properties:
                                rat: { type: string, enum: [LTE] }
                                enbid: { type: integer, minimum: 0, maximum: 1048575 }
                                clid: { type: integer, minimum: 0, maximum: 255, nullable: true }
                                tac: { type: integer, minimum: 0, maximum: 65535, nullable: true }
                                pci: { type: integer, minimum: 0, maximum: 503, nullable: true }
                                earfcn: { type: integer, minimum: 0, maximum: 262143, nullable: true }
                            - type: object
                              required: [rat]
                              properties:
                                rat: { type: string, enum: [NR] }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /analyzer/apply:
    post:
      tags: [Analyzer]
      summary: Apply cell additions and updates from analyzer results
      description: |
        Applies a batch of cell add/update operations to stations. Each item in the batch targets one station and contains one or more cell operations.
        The batch is capped at 25 station items.
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  minItems: 1
                  maxItems: 25
                  items:
                    type: object
                    required: [station_id, cells]
                    properties:
                      station_id:
                        type: integer
                      cells:
                        type: array
                        minItems: 1
                        items:
                          oneOf:
                            - description: Add a new GSM cell
                              type: object
                              required: [operation, band_id, rat, details]
                              properties:
                                operation: { type: string, enum: [add] }
                                band_id: { type: integer }
                                rat: { type: string, enum: [GSM] }
                                details: { $ref: "#/components/schemas/GsmCellDetails" }
                            - description: Add a new UMTS cell
                              type: object
                              required: [operation, band_id, rat, details]
                              properties:
                                operation: { type: string, enum: [add] }
                                band_id: { type: integer }
                                rat: { type: string, enum: [UMTS] }
                                details: { $ref: "#/components/schemas/UmtsCellDetailsInsert" }
                            - description: Add a new LTE cell
                              type: object
                              required: [operation, band_id, rat, details]
                              properties:
                                operation: { type: string, enum: [add] }
                                band_id: { type: integer }
                                rat: { type: string, enum: [LTE] }
                                details: { $ref: "#/components/schemas/LteCellDetailsInsert" }
                            - description: Add a new NR cell
                              type: object
                              required: [operation, band_id, rat, details]
                              properties:
                                operation: { type: string, enum: [add] }
                                band_id: { type: integer }
                                rat: { type: string, enum: [NR] }
                                details: { $ref: "#/components/schemas/NrCellDetailsInsert" }
                            - description: Update an existing GSM cell
                              type: object
                              required: [operation, band_id, rat, target_cell_id]
                              properties:
                                operation: { type: string, enum: [update] }
                                target_cell_id: { type: integer }
                                band_id: { type: integer }
                                rat: { type: string, enum: [GSM] }
                                details: { $ref: "#/components/schemas/GsmCellDetails" }
                            - description: Update an existing UMTS cell
                              type: object
                              required: [operation, band_id, rat, target_cell_id]
                              properties:
                                operation: { type: string, enum: [update] }
                                target_cell_id: { type: integer }
                                band_id: { type: integer }
                                rat: { type: string, enum: [UMTS] }
                                details: { $ref: "#/components/schemas/UmtsCellDetailsInsert" }
                            - description: Update an existing LTE cell
                              type: object
                              required: [operation, band_id, rat, target_cell_id]
                              properties:
                                operation: { type: string, enum: [update] }
                                target_cell_id: { type: integer }
                                band_id: { type: integer }
                                rat: { type: string, enum: [LTE] }
                                details: { $ref: "#/components/schemas/LteCellDetailsInsert" }
                            - description: Update an existing NR cell
                              type: object
                              required: [operation, band_id, rat, target_cell_id]
                              properties:
                                operation: { type: string, enum: [update] }
                                target_cell_id: { type: integer }
                                band_id: { type: integer }
                                rat: { type: string, enum: [NR] }
                                details: { $ref: "#/components/schemas/NrCellDetailsInsert" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required: [station_id, applied]
                      properties:
                        station_id: { type: integer }
                        applied:
                          type: integer
                          description: Number of cell operations successfully applied for this station
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /search:
    post:
      tags: [Search]
      summary: Search stations by query string or filters
      description: |
        Search by free text (station_id, numeric cell IDs, city, address or network IDs) or use filter syntax in the query string.
        Filter format: `key: value` or `key: 'value'` or `key: 123` or `key: value1, value2`. Supported filter keys:
        - **stations**: bts_id, mnc
        - **cells**: band, rat, is_confirmed
        - **gsmCells**: lac, cid
        - **umtsCells**: rnc, umts_cid, cid_long, umts_lac
        - **lteCells**: enbid, ecid, lte_clid, tac, supports_iot
        - **nrCells**: gnbid, nci, nr_clid, nrtac, supports_nr_redcap
        - **locations**: region (3-letter codes), city, address
        - **extraIdentifiers**: networks_id, networks_name, mno_name
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 100 }
        - name: sort
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
        - name: sortBy
          in: query
          schema: { type: string, enum: [station_id, updatedAt, createdAt, relevance], default: relevance }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string, minLength: 1 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/StationSearchResult" } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /audit-logs:
    get:
      tags: [Audit Logs]
      summary: List audit logs
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: table_name
          in: query
          schema: { type: string }
        - name: record_id
          in: query
          description: Search record ID, IP address, old/new values, and metadata
          schema: { type: string }
        - name: actions
          in: query
          description: Comma-separated list of audit actions to filter by (e.g. `stations.create,stations.delete`)
          schema: { type: string }
        - name: invoked_by
          in: query
          schema: { type: string, format: uuid }
        - name: user_ids
          in: query
          description: Comma-separated list of user IDs to filter by actor
          schema: { type: string }
        - name: from
          in: query
          description: ISO date for createdAt >=
          schema: { type: string, format: date-time }
        - name: to
          in: query
          description: ISO date for createdAt <=
          schema: { type: string, format: date-time }
        - name: sort
          in: query
          schema: { type: string, enum: [asc, desc], default: desc }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, totalCount]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/AuditLogWithUser" } }
                  totalCount: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /audit-logs/{id}:
    get:
      tags: [Audit Logs]
      summary: Get audit log by ID
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/AuditLogWithUser" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /uke/locations:
    get:
      tags: [UKE]
      summary: List UKE locations with permits
      parameters:
        - name: bounds
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 500 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: rat
          in: query
          schema: { type: string }
        - name: operators
          in: query
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: bands
          in: query
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: regions
          in: query
          schema: { type: string, pattern: "^[A-Z]{3}(,[A-Z]{3})*$" }
        - name: since
          in: query
          description: Filter by recent date fields using `createdAt:30`, `updatedAt:30`, or `createdAt,updatedAt:30`. For UKE `createdAt`, a station is new only when all permits for the same UKE station were created within the window.
          schema: { type: string, pattern: "^(createdAt|updatedAt)(?:,(createdAt|updatedAt))?:\\d+$" }
        - name: azimuths
          in: query
          description: When true, each permit includes its `sectors` array with azimuth data. Omitted by default
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, totalCount]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/UkeLocationWithPermits" } }
                  totalCount: { type: integer }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /uke/permits:
    get:
      tags: [UKE]
      summary: List UKE permits
      parameters:
        - name: bounds
          in: query
          schema: { type: string, pattern: "^-?\\d+\\.\\d+,-?\\d+\\.\\d+,-?\\d+\\.\\d+,-?\\d+\\.\\d+$" }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, default: 150 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: rat
          in: query
          schema: { type: string }
        - name: operators
          in: query
          description: Filter by comma-separated operator MNC codes. Passing `26034` also includes Orange and T-Mobile NetWorks operators
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: bands
          in: query
          schema: { type: string }
        - name: decisionType
          in: query
          schema: { type: string, enum: [zmP, P] }
        - name: decision_number
          in: query
          schema: { type: string }
        - name: station_id
          in: query
          schema: { type: string }
        - name: operator
          in: query
          description: Filter by operator MNC code (e.g. 26003)
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/UkePermitWithBandOperatorLocation" } }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /uke/permits/{id}:
    get:
      tags: [UKE]
      summary: Get UKE permit by ID
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/UkePermitWithBandOperatorLocation" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /uke/permits/unassigned:
    get:
      tags: [UKE]
      summary: Get UKE permits without assigned stations
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: operators
          in: query
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: regions
          in: query
          schema: { type: string, pattern: "^[A-Z]{3}(,[A-Z]{3})*$" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, totalCount]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/UnassignedPermitStation" }
                  totalCount: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /uke/stations:
    get:
      tags: [UKE]
      summary: List UKE stations with permits
      parameters:
        - name: bounds
          in: query
          schema: { type: string, pattern: "^-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*$" }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 500 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: rat
          in: query
          schema: { type: string, pattern: "^(?:cdma|umts|gsm|gsm-r|lte|nr|iot)(?:,(?:cdma|umts|gsm|gsm-r|lte|nr|iot))*$" }
        - name: operators
          in: query
          description: Filter by comma-separated operator MNC codes. Passing `26034` also includes Orange and T-Mobile NetWorks operators
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: bands
          in: query
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: since
          in: query
          description: Filter by recent station date fields using `createdAt:30`, `updatedAt:30`, or `createdAt,updatedAt:30`
          schema: { type: string, pattern: "^(createdAt|updatedAt)(?:,(createdAt|updatedAt))?:\\d+$" }
        - name: station_id
          in: query
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, totalCount]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/UkeStationWithPermits" } }
                  totalCount: { type: integer }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /uke/radiolines:
    get:
      tags: [UKE]
      summary: List UKE radiolines
      parameters:
        - name: bounds
          in: query
          schema: { type: string, pattern: "^-?\\d+\\.\\d+,-?\\d+\\.\\d+,-?\\d+\\.\\d+,-?\\d+\\.\\d+$" }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 1000, default: 150 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: operators
          in: query
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: permit_number
          in: query
          schema: { type: string }
        - name: decision_type
          in: query
          schema: { type: string, enum: [zmP, P] }
        - name: new
          in: query
          description: Only return radiolines updated within the last N days (1-30). Pass `true` for 30 days
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, totalCount]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/UkeRadiolineResponse" } }
                  totalCount: { type: integer }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /uke/radiolines/operators:
    get:
      tags: [UKE]
      summary: List UKE radioline operators
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/UkeOperator" } }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /uke/radiolines/{id}:
    get:
      tags: [UKE]
      summary: Get UKE radioline by ID
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/UkeRadiolineResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /uke/search:
    post:
      tags: [UKE]
      summary: Search UKE permits and radiolines
      description: Searches UKE permits by decision_number or station_id and radiolines by permit_number. Results are grouped by station_id for permits and by permit_number for radiolines
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string, minLength: 1 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [stations, radiolines]
                    properties:
                      stations:
                        type: array
                        items: { $ref: "#/components/schemas/UkeSearchStation" }
                      radiolines:
                        type: array
                        items: { $ref: "#/components/schemas/UkeRadiolineSearchResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /uke/import:
    post:
      tags: [UKE]
      summary: Start UKE import job
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                importPermits: { type: boolean, default: true }
                importRadiolines: { type: boolean, default: true }
                importDeviceRegistry: { type: boolean, default: true }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/UkeImportJobStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /uke/import/status:
    get:
      tags: [UKE]
      summary: Get UKE import job status
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/UkeImportJobStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /lists:
    get:
      tags: [Lists]
      summary: List user lists
      description: Returns lists owned by the authenticated user. Admins with `user_lists:read` permission can pass `all=true` to see all lists across all users
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: search
          in: query
          schema: { type: string }
        - name: all
          in: query
          description: Return all users' lists. Requires `user_lists:read` admin permission. Ignored for non-admins
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, totalCount]
                properties:
                  data: { type: array, items: { $ref: "#/components/schemas/UserListSummary" } }
                  totalCount: { type: integer }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      tags: [Lists]
      summary: Create a user list
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserListCreate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/UserListRecord" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /lists/{uuid}:
    get:
      tags: [Lists]
      summary: Get list by UUID with full station and radioline data
      description: Public lists are accessible without authentication. Private lists require authentication and ownership (or admin `user_lists:read` permission)
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: uuid
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: azimuths
          in: query
          description: When `true`, each UKE permit in the response will include a `sectors` array with azimuth data
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/UserListDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    patch:
      tags: [Lists]
      summary: Update a user list
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: uuid
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserListPatch"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: "#/components/schemas/UserListRecord" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      tags: [Lists]
      summary: Delete a user list
      security:
        - ApiKeyAuth: []
        - CookieAuth: []
      parameters:
        - name: uuid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: No Content
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /pem/planned:
    get:
      tags: [PEM]
      summary: List planned PEM measurements
      description: |
        Returns planned, completed, or canceled PEM measurements from SI2PEM.
        Supports two modes depending on whether `bounds` is provided:
        - Bounds mode: fetches features from the SI2PEM WFS for a map viewport. Filters out measurements
          whose end date is more than 1 year in the past. Results are cached for 1 hour
        - Pagination mode: queries the SI2PEM REST API with optional status, operator, and station ID
          filters. PLANNED results cached for 1 hour; COMPLETED/CANCELED for 24 hours
      parameters:
        - name: bounds
          in: query
          description: "Map viewport as west,south,east,north. When present, activates bounds mode"
          schema: { type: string, pattern: "^-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*,-?\\d+\\.?\\d*$" }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: status
          in: query
          schema: { type: string, enum: [PLANNED, COMPLETED, CANCELED], default: PLANNED }
        - name: operators
          in: query
          description: Comma-separated MNC numbers to filter by (e.g. 26002,26003)
          schema: { type: string, pattern: "^\\d+(,\\d+)*$" }
        - name: station_id
          in: query
          description: Filter by station_id (partial match forwarded to SI2PEM)
          schema: { type: string, minLength: 1 }
        - name: operator
          in: query
          description: SI2PEM legal entity name (e.g. "Orange Polska S.A."). Takes precedence over `operators` for pagination mode
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [totalCount, data]
                properties:
                  totalCount: { type: integer }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/PemItem" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /pem/{station_id}:
    get:
      tags: [PEM]
      summary: Get PEM measurement reports for a station
      description: |
        Returns a list of electromagnetic field (PEM) measurement reports
        from SI2PEM for the given station. Queries the SI2PEM installations API and WMS
        GetFeatureInfo. Results are cached for 24 hours with
        automatic cache invalidation when a newer report is published.
        Reports are sorted by published date descending.
      parameters:
        - name: station_id
          in: path
          required: true
          description: Station identifier string (e.g. "KSC0601" or "90")
          schema: { type: string }
        - name: lat
          in: query
          required: true
          description: Latitude of the station
          schema: { type: number, format: double }
        - name: lng
          in: query
          required: true
          description: Longitude of the station
          schema: { type: number, format: double }
        - name: operator
          in: query
          required: true
          description: Operator MNC (e.g. 26002 for T-Mobile). Used to map to the SI2PEM legal entity name
          schema: { type: integer }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/PemReport" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /kmz:
    get:
      tags: [KMZ]
      summary: List generated KMZ files
      description: |
        Returns pre-generated KMZ (Google Earth) files from our UKE imports, for both stations and radiolines. Each file's `region` is a full region object (or `null` for combined, new-stations, or unknown-region files). Use `/kmz/dates` to discover which dates have data for a given `type`/`source` combination before filtering here
      parameters:
        - name: date
          in: query
          description: Export date in YYYY-MM-DD format. Omit to return files across all available dates
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$", example: "2026-06-25" }
        - name: type
          in: query
          schema: { type: string, enum: [stations, radiolines] }
        - name: source
          in: query
          schema: { type: string, enum: [all, permits, device_registry] }
        - name: region
          in: query
          description: Three-letter region code to filter by
          schema: { type: string, pattern: "^[A-Z]{3}$" }
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 50 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data, totalCount]
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/KmzFile" }
                  totalCount: { type: integer }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /kmz/dates:
    get:
      tags: [KMZ]
      summary: List available KMZ export dates
      description: |
        Returns the export dates (descending) that have at least one generated KMZ file for the given `type` and `source`. Meant to populate a date filter without paging through the full `/kmz` file list
      parameters:
        - name: type
          in: query
          required: true
          schema: { type: string, enum: [stations, radiolines] }
        - name: source
          in: query
          schema: { type: string, enum: [all, permits, device_registry], default: all }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { type: string, format: date, example: "2026-06-25" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /kmz/download:
    get:
      tags: [KMZ]
      summary: Download a generated KMZ file
      description: Streams the KMZ file matching the given date, type, source, and optional region as `application/vnd.google-earth.kmz`
      parameters:
        - name: date
          in: query
          required: true
          schema: { type: string, pattern: "^\\d{4}-\\d{2}-\\d{2}$", example: "2026-06-25" }
        - name: type
          in: query
          required: true
          schema: { type: string, enum: [stations, radiolines] }
        - name: source
          in: query
          required: true
          schema: { type: string, enum: [all, permits, device_registry] }
        - name: region
          in: query
          description: Three-letter region code
          schema: { type: string, pattern: "^[A-Z]{3}$" }
      responses:
        "200":
          description: The KMZ file
          content:
            application/vnd.google-earth.kmz: { schema: { type: string, format: binary } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: API Key for authentication via X-Api-Key header
    CookieAuth:
      type: apiKey
      in: cookie
      name: auth
      description: Cookie-based authentication

  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: integer }
    StationIdPath:
      name: station_id
      in: path
      required: true
      schema: { type: integer }

  responses:
    BadRequest:
      description: Bad request (invalid parameters, validation error, or invalid query)
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiError"
              - type: object
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum: [BAD_REQUEST, VALIDATION_ERROR, INVALID_QUERY]
          example:
            errors:
              - code: BAD_REQUEST
                message: Invalid request
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiError"
              - type: object
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum: [UNAUTHORIZED]
          example:
            errors:
              - code: UNAUTHORIZED
                message: Unauthorized
    Forbidden:
      description: Forbidden or insufficient permissions
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiError"
              - type: object
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum: [FORBIDDEN, INSUFFICIENT_PERMISSIONS]
          example:
            errors:
              - code: FORBIDDEN
                message: Forbidden
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiError"
              - type: object
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum: [NOT_FOUND]
          example:
            errors:
              - code: NOT_FOUND
                message: Resource not found
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiError"
              - type: object
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum: [TOO_MANY_REQUESTS]
          example:
            errors:
              - code: TOO_MANY_REQUESTS
                message: Too many requests
    Conflict:
      description: Conflict (e.g. duplicate entry)
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiError"
              - type: object
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum: [DUPLICATE_ENTRY]
          example:
            errors:
              - code: DUPLICATE_ENTRY
                message: Duplicate entry
    InternalServerError:
      description: Internal server error (e.g. failed to create/update/delete)
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ApiError"
              - type: object
                properties:
                  errors:
                    items:
                      properties:
                        code:
                          enum: [INTERNAL_SERVER_ERROR, FAILED_TO_CREATE, FAILED_TO_UPDATE, FAILED_TO_DELETE, AUTH_FAILURE]
          example:
            errors:
              - code: INTERNAL_SERVER_ERROR
                message: Internal server error

  schemas:
    PemItem:
      type: object
      required: [id, station_id, operator, lab, location, region, date, status]
      properties:
        id: { type: integer, nullable: true }
        station_id: { type: string, nullable: true }
        operator: { $ref: "#/components/schemas/Operator", nullable: true }
        lab:
          type: object
          required: [PCA, name]
          properties:
            PCA: { type: string }
            name: { type: string }
        location:
          type: object
          required: [longitude, latitude, city, address]
          properties:
            longitude: { type: number, format: double }
            latitude: { type: number, format: double }
            city: { type: string }
            address: { type: string }
        region: { $ref: "#/components/schemas/Region", nullable: true }
        date:
          type: object
          required: [from, to]
          properties:
            from: { type: string, format: date-time }
            to: { type: string, format: date-time }
        status: { type: string, enum: [PLANNED, COMPLETED, CANCELED] }

    PemReport:
      type: object
      required: [station_id, source, date, type, details]
      properties:
        station_id: { type: string }
        source: { type: string, enum: [map, search] }
        date: { type: string, format: date-time }
        type: { type: string, enum: [planned_measurement, map_measurement, search_measurement] }
        details:
          oneOf:
            - type: object
              required: [from_date, to_date, lab_name]
              properties:
                from_date: { type: string }
                to_date: { type: string }
                lab_name: { type: string }
            - type: object
              required: [document_url, lab_name]
              properties:
                document_url: { type: string, format: uri }
                lab_name: { type: string }
            - type: object
              required: [document_url, installation_document, lab_name]
              properties:
                document_url: { type: string, format: uri }
                installation_document: { type: string, format: uri }
                lab_name: { type: string }

    KmzFile:
      type: object
      required: [date, type, source, region, filename, size]
      properties:
        date: { type: string, format: date, example: "2026-06-25" }
        type: { type: string, enum: [stations, radiolines] }
        source: { type: string, enum: [all, permits, device_registry] }
        region:
          $ref: "#/components/schemas/Region"
          nullable: true
          description: Null for combined, new-stations/radiolines, or unknown-region files
        filename: { type: string }
        size: { type: integer, description: File size in bytes }

    ApiError:
      type: object
      required: [errors]
      properties:
        errors:
          type: array
          minItems: 1
          items:
            type: object
            required: [code, message]
            properties:
              code:
                type: string
                enum:
                  - INTERNAL_SERVER_ERROR
                  - BAD_REQUEST
                  - NOT_FOUND
                  - UNAUTHORIZED
                  - FORBIDDEN
                  - FAILED_TO_DELETE
                  - INVALID_QUERY
                  - FAILED_TO_UPDATE
                  - FAILED_TO_CREATE
                  - AUTH_FAILURE
                  - VALIDATION_ERROR
                  - ALREADY_LOGGED_IN
                  - INSUFFICIENT_PERMISSIONS
                  - TOO_MANY_REQUESTS
                  - DUPLICATE_ENTRY
              message: { type: string }
              details:
                type: array
                description: Only present for VALIDATION_ERROR
                items:
                  type: object
                  properties:
                    field: { type: string }
                    validationMessage: { type: string, nullable: true }

    RuntimeSettings:
      type: object
      required:
        [
          enforceAuthForAllRoutes,
          allowedUnauthenticatedRoutes,
          disabledRoutes,
          enableStationComments,
          commentQueueEnabled,
          submissionsEnabled,
          photosEnabled,
          announcement,
        ]
      properties:
        enforceAuthForAllRoutes: { type: boolean }
        allowedUnauthenticatedRoutes: { type: array, items: { type: string } }
        disabledRoutes: { type: array, items: { type: string } }
        enableStationComments: { type: boolean }
        commentQueueEnabled: { type: boolean }
        submissionsEnabled: { type: boolean }
        photosEnabled: { type: boolean }
        announcement:
          type: object
          required: [message, enabled, type]
          properties:
            message: { type: string }
            enabled: { type: boolean }
            type: { type: string, enum: [info, warning, error] }
    RuntimeSettingsPatch:
      type: object
      properties:
        enforceAuthForAllRoutes: { type: boolean }
        allowedUnauthenticatedRoutes: { type: array, items: { type: string } }
        disabledRoutes: { type: array, items: { type: string } }
        enableStationComments: { type: boolean }
        commentQueueEnabled: { type: boolean }
        submissionsEnabled: { type: boolean }
        photosEnabled: { type: boolean }
        announcement:
          type: object
          properties:
            message: { type: string }
            enabled: { type: boolean }
            type: { type: string, enum: [info, warning, error] }

    PhotoAuthor:
      type: object
      nullable: true
      properties:
        uuid: { type: string, format: uuid }
        username: { type: string }
        name: { type: string }
    StationPhoto:
      type: object
      description: A location photo selected for display on a station, with is_main indicating the station's primary photo
      required: [id, attachment_uuid, mime_type, is_main, note, taken_at, createdAt, author]
      properties:
        id: { type: integer, description: "ID of the location_photo record" }
        attachment_uuid: { type: string, format: uuid }
        mime_type: { type: string }
        is_main: { type: boolean }
        note: { type: string, maxLength: 100, nullable: true }
        taken_at: { type: string, format: date-time, nullable: true, description: "Date the photo was taken" }
        createdAt: { type: string, format: date-time }
        author: { $ref: "#/components/schemas/PhotoAuthor" }
    LocationPhoto:
      type: object
      description: A photo belonging to a location, shared across all stations at that location
      required: [id, attachment_uuid, mime_type, note, taken_at, createdAt, author]
      properties:
        id: { type: integer }
        attachment_uuid: { type: string, format: uuid }
        mime_type: { type: string }
        note: { type: string, maxLength: 100, nullable: true }
        taken_at: { type: string, format: date-time, nullable: true, description: "Date the photo was taken" }
        createdAt: { type: string, format: date-time }
        author: { $ref: "#/components/schemas/PhotoAuthor" }
    LocationPhotoSelection:
      allOf:
        - $ref: "#/components/schemas/LocationPhoto"
        - type: object
          properties:
            is_main: { type: boolean }
    Notification:
      type: object
      required: [id, userId, type, title, submissionId, metadata, actionUrl, readAt, createdAt]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        type: { type: string, enum: [submission_approved, submission_rejected, new_submission] }
        title: { type: string }
        submissionId: { type: string, format: uuid, nullable: true }
        metadata: { type: object, nullable: true, additionalProperties: true }
        actionUrl: { type: string, nullable: true }
        readAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
    SubmissionPhoto:
      type: object
      required: [id, attachment_uuid, mime_type, note, taken_at, createdAt, author]
      properties:
        id: { type: integer }
        attachment_uuid: { type: string, format: uuid }
        mime_type: { type: string }
        note: { type: string, maxLength: 100, nullable: true }
        taken_at: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        author: { $ref: "#/components/schemas/PhotoAuthor" }

    Band:
      type: object
      properties:
        id: { type: integer }
        value: { type: integer, nullable: true }
        rat: { type: string, enum: [GSM, CDMA, UMTS, LTE, NR, IOT] }
        name: { type: string }
        duplex: { type: string, enum: [FDD, TDD], nullable: true }
        variant: { type: string, enum: [commercial, railway] }
    BandCreate:
      type: object
      required: [rat, name]
      properties:
        value: { type: integer, nullable: true }
        rat: { type: string, enum: [GSM, CDMA, UMTS, LTE, NR, IOT] }
        name: { type: string }
        duplex: { type: string, enum: [FDD, TDD], nullable: true }
        variant: { type: string, enum: [commercial, railway] }
    BandUpdate:
      type: object
      properties:
        value: { type: integer, nullable: true }
        rat: { type: string, enum: [GSM, CDMA, UMTS, LTE, NR, IOT] }
        name: { type: string }
        duplex: { type: string, enum: [FDD, TDD], nullable: true }
        variant: { type: string, enum: [commercial, railway] }

    Operator:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        full_name: { type: string }
        parent_id: { type: integer, nullable: true }
        mnc: { type: integer, nullable: true }
    OperatorCreate:
      type: object
      required: [name, full_name]
      properties:
        name: { type: string }
        full_name: { type: string }
        parent_id: { type: integer, nullable: true }
        mnc: { type: integer, nullable: true }
    OperatorUpdate:
      type: object
      properties:
        name: { type: string }
        full_name: { type: string }
        parent_id: { type: integer, nullable: true }
        mnc: { type: integer, nullable: true }

    Region:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string }
    RegionCreate:
      type: object
      required: [name, code]
      properties:
        name: { type: string }
        code: { type: string }
    RegionUpdate:
      type: object
      properties:
        name: { type: string }
        code: { type: string }

    Location:
      type: object
      properties:
        id: { type: integer }
        city: { type: string, nullable: true }
        address: { type: string, nullable: true }
        longitude: { type: number }
        latitude: { type: number }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
    LocationCreate:
      type: object
      required: [region_id, longitude, latitude]
      properties:
        region_id: { type: integer }
        city: { type: string, nullable: true }
        address: { type: string, nullable: true }
        longitude: { type: number }
        latitude: { type: number }
    LocationUpdate:
      type: object
      properties:
        region_id: { type: integer }
        city: { type: string, nullable: true }
        address: { type: string, nullable: true }
        longitude: { type: number }
        latitude: { type: number }
    LocationWithRegionStations:
      allOf:
        - $ref: "#/components/schemas/Location"
        - type: object
          properties:
            region: { $ref: "#/components/schemas/Region" }
            stations: { type: array, items: { $ref: "#/components/schemas/StationWithCellsAndOperator" } }

    CellWithBand:
      allOf:
        - $ref: "#/components/schemas/CellBaseSlim"
        - type: object
          properties:
            band: { $ref: "#/components/schemas/Band" }
    StationWithCellsAndOperator:
      allOf:
        - $ref: "#/components/schemas/Station"
        - type: object
          properties:
            cells: { type: array, items: { $ref: "#/components/schemas/CellWithBand" } }
            sectors:
              type: array
              description: Included only when the location endpoint is called with `?azimuths=true`
              items: { $ref: "#/components/schemas/StationSector" }
            operator:
              allOf:
                - $ref: "#/components/schemas/Operator"
              nullable: true
            extra_identificators:
              allOf:
                - $ref: "#/components/schemas/ExtraIdentificators"
              nullable: true

    AnalyzerStation:
      type: object
      required: [id, station_id, updatedAt, createdAt, operator, location]
      properties:
        id: { type: integer }
        station_id: { type: string }
        notes: { type: string, nullable: true }
        extra_address: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        is_confirmed: { type: boolean, nullable: true }
        operator: { $ref: "#/components/schemas/Operator" }
        location: { $ref: "#/components/schemas/LocationWithRegion" }
    StationRecord:
      type: object
      description: Raw station database record as returned by update operations (no joined relations)
      properties:
        id: { type: integer }
        station_id: { type: string }
        location_id: { type: integer, nullable: true }
        operator_id: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        extra_address: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        is_confirmed: { type: boolean, nullable: true }
        status: { type: string, enum: [published, inactive, pending] }
        statusChangedAt: { type: string, format: date-time, nullable: true }
    StationSector:
      type: object
      properties:
        id: { type: integer }
        azimuth: { type: integer, minimum: 0, maximum: 359 }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
    StationSectorInput:
      type: object
      required: [azimuth]
      properties:
        id: { type: integer, description: "Existing station sector ID. Omit to create a new sector" }
        azimuth: { type: integer, minimum: 0, maximum: 359 }
    Station:
      type: object
      required: [status]
      properties:
        id: { type: integer }
        station_id: { type: string }
        notes: { type: string, nullable: true }
        extra_address: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        is_confirmed: { type: boolean, nullable: true }
        status: { type: string, enum: [published, inactive, pending] }
        statusChangedAt: { type: string, format: date-time, nullable: true }
        operator: { $ref: "#/components/schemas/Operator" }
        location: { $ref: "#/components/schemas/Location" }
        extra_identificators:
          allOf:
            - $ref: "#/components/schemas/ExtraIdentificators"
          nullable: true
    StationUpdate:
      type: object
      properties:
        station_id: { type: string }
        location_id: { type: integer, nullable: true }
        operator_id: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        is_confirmed: { type: boolean, nullable: true }
        status:
          {
            type: string,
            enum: [published, inactive, pending],
            description: "Station status. Only valid transitions are allowed: pending→published, pending→inactive, published→inactive",
          }
    StationCreate:
      type: object
      required: [cells]
      properties:
        station_id: { type: string }
        location_id: { type: integer, nullable: true }
        operator_id: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        is_confirmed: { type: boolean, nullable: true }
        cells: { type: array, items: { $ref: "#/components/schemas/CellCreate" } }
    StationWithCells:
      allOf:
        - $ref: "#/components/schemas/Station"
        - type: object
          properties:
            cells: { type: array, items: { $ref: "#/components/schemas/CellWithBandAndDetails" } }
            sectors:
              type: array
              description: Included on station detail responses
              items: { $ref: "#/components/schemas/StationSector" }
            location: { $ref: "#/components/schemas/LocationWithRegion" }
            operator:
              allOf:
                - $ref: "#/components/schemas/Operator"
              nullable: true
            extra_identificators:
              allOf:
                - $ref: "#/components/schemas/ExtraIdentificators"
              nullable: true
    StationSearchResult:
      allOf:
        - $ref: "#/components/schemas/Station"
        - type: object
          properties:
            cells: { type: array, items: { $ref: "#/components/schemas/CellWithDetails" } }
            location:
              allOf:
                - $ref: "#/components/schemas/LocationWithRegion"
              nullable: true
            operator:
              allOf:
                - $ref: "#/components/schemas/Operator"
              nullable: true
            extra_identificators:
              allOf:
                - $ref: "#/components/schemas/ExtraIdentificators"
              nullable: true
    LocationWithRegion:
      allOf:
        - $ref: "#/components/schemas/Location"
        - type: object
          properties:
            region: { $ref: "#/components/schemas/Region" }
    CellBaseSlim:
      type: object
      properties:
        id: { type: integer }
        sector_id: { type: integer, nullable: true }
        rat: { type: string, enum: [GSM, CDMA, UMTS, LTE, NR, IOT] }
        notes: { type: string, nullable: true }
        is_confirmed: { type: boolean, nullable: true }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
    CellBase:
      type: object
      properties:
        id: { type: integer }
        station_id: { type: integer }
        band_id: { type: integer }
        sector_id: { type: integer, nullable: true }
        rat: { type: string, enum: [GSM, CDMA, UMTS, LTE, NR, IOT] }
        notes: { type: string, nullable: true }
        is_confirmed: { type: boolean, nullable: true }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
    GsmCellDetails:
      type: object
      properties:
        lac: { type: integer, minimum: 0, maximum: 65535 }
        cid: { type: integer, minimum: 0, maximum: 65535 }
        e_gsm: { type: boolean, nullable: true }
    UmtsCellDetails:
      type: object
      properties:
        lac: { type: integer, minimum: 0, maximum: 65535, nullable: true }
        arfcn: { type: integer, minimum: 0, maximum: 16383, nullable: true }
        rnc: { type: integer, minimum: 0, maximum: 65535, nullable: true }
        cid: { type: integer, minimum: 0, maximum: 65535, nullable: true }
        cid_long: { type: integer, nullable: true }
    LteCellDetails:
      type: object
      properties:
        tac: { type: integer, minimum: 0, maximum: 65535, nullable: true }
        enbid: { type: integer, minimum: 0, maximum: 1048575, nullable: true }
        clid: { type: integer, minimum: 0, maximum: 255, nullable: true }
        ecid: { type: integer, nullable: true }
        pci: { type: integer, minimum: 0, maximum: 503, nullable: true }
        earfcn: { type: integer, minimum: 0, maximum: 262143, nullable: true }
        supports_iot: { type: boolean, nullable: true }
    NrCellDetails:
      type: object
      properties:
        nrtac: { type: integer, minimum: 0, maximum: 16777215, nullable: true }
        gnbid: { type: integer, minimum: 0, maximum: 4294967295, nullable: true }
        gnbid_length: { type: integer, nullable: true }
        clid: { type: integer, minimum: 0, maximum: 16383, nullable: true }
        nci: { type: integer, nullable: true }
        pci: { type: integer, minimum: 0, maximum: 1007, nullable: true }
        arfcn: { type: integer, minimum: 0, maximum: 3279165, nullable: true }
        type: { type: string, enum: [nsa, sa], nullable: true }
        supports_nr_redcap: { type: boolean, nullable: true }
    UmtsCellDetailsInsert:
      description: UMTS cell details for create/update
      type: object
      properties:
        lac: { type: integer, minimum: 0, maximum: 65535, nullable: true }
        arfcn: { type: integer, minimum: 0, maximum: 16383, nullable: true }
        rnc: { type: integer, minimum: 0, maximum: 65535 }
        cid: { type: integer, minimum: 0, maximum: 65535 }
    LteCellDetailsInsert:
      description: LTE cell details for create/update
      type: object
      properties:
        tac: { type: integer, minimum: 0, maximum: 65535, nullable: true }
        enbid: { type: integer, minimum: 0, maximum: 1048575 }
        clid: { type: integer, minimum: 0, maximum: 255 }
        pci: { type: integer, minimum: 0, maximum: 503, nullable: true }
        earfcn: { type: integer, minimum: 0, maximum: 262143, nullable: true }
        supports_iot: { type: boolean, nullable: true }
    NrCellDetailsInsert:
      description: NR cell details for create/update
      type: object
      properties:
        nrtac: { type: integer, minimum: 0, maximum: 16777215, nullable: true }
        gnbid: { type: integer, minimum: 0, maximum: 4294967295, nullable: true }
        clid: { type: integer, minimum: 0, maximum: 16383, nullable: true }
        pci: { type: integer, minimum: 0, maximum: 1007, nullable: true }
        arfcn: { type: integer, minimum: 0, maximum: 3279165, nullable: true }
        type: { type: string, enum: [nsa, sa], nullable: true }
        supports_nr_redcap: { type: boolean, nullable: true }
    CellDetailsInsert:
      description: Cell RAT-specific payload for create/update
      oneOf:
        - $ref: "#/components/schemas/GsmCellDetails"
        - $ref: "#/components/schemas/UmtsCellDetailsInsert"
        - $ref: "#/components/schemas/LteCellDetailsInsert"
        - $ref: "#/components/schemas/NrCellDetailsInsert"
    CellDetails:
      oneOf:
        - $ref: "#/components/schemas/GsmCellDetails"
        - $ref: "#/components/schemas/UmtsCellDetails"
        - $ref: "#/components/schemas/LteCellDetails"
        - $ref: "#/components/schemas/NrCellDetails"
    CellWithDetails:
      allOf:
        - $ref: "#/components/schemas/CellBase"
        - type: object
          properties:
            station:
              allOf:
                - $ref: "#/components/schemas/Station"
              nullable: true
            band:
              allOf:
                - $ref: "#/components/schemas/Band"
              nullable: true
            details:
              allOf:
                - $ref: "#/components/schemas/CellDetails"
              nullable: true
    CellWithDetailsAndBand:
      allOf:
        - $ref: "#/components/schemas/CellBase"
        - type: object
          properties:
            band: { $ref: "#/components/schemas/Band" }
            details:
              allOf:
                - $ref: "#/components/schemas/CellDetails"
              nullable: true
    CellWithBandAndDetails:
      allOf:
        - $ref: "#/components/schemas/CellBaseSlim"
        - type: object
          properties:
            band: { $ref: "#/components/schemas/Band" }
            details:
              allOf:
                - $ref: "#/components/schemas/CellDetails"
              nullable: true
    CellWithStationBandDetails:
      allOf:
        - $ref: "#/components/schemas/CellBase"
        - type: object
          properties:
            station: { $ref: "#/components/schemas/Station" }
            band: { $ref: "#/components/schemas/Band" }
            details:
              allOf:
                - $ref: "#/components/schemas/CellDetails"
              nullable: true
    CellCreate:
      type: object
      required: [station_id, band_id, rat]
      properties:
        station_id: { type: integer }
        band_id: { type: integer }
        sector_id: { type: integer, nullable: true }
        rat: { type: string, enum: [GSM, CDMA, UMTS, LTE, NR] }
        notes: { type: string, nullable: true }
        is_confirmed: { type: boolean, nullable: true }
        details: { $ref: "#/components/schemas/CellDetailsInsert" }
    CellUpdate:
      type: object
      properties:
        band_id: { type: integer }
        sector_id: { type: integer, nullable: true }
        rat: { type: string, enum: [GSM, CDMA, UMTS, LTE, NR] }
        notes: { type: string, nullable: true }
        is_confirmed: { type: boolean, nullable: true }
        details: { $ref: "#/components/schemas/CellDetailsInsert" }

    StationComment:
      type: object
      properties:
        id: { type: integer }
        station_id: { type: integer }
        user_id: { type: string, format: uuid }
        content: { type: string }
        status: { type: string, enum: [pending, approved] }
        attachments: { type: array, items: { type: object, properties: { uuid: { type: string }, type: { type: string } } }, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    StationCommentWithAuthor:
      allOf:
        - $ref: "#/components/schemas/StationComment"
        - type: object
          properties:
            author:
              nullable: true
              type: object
              properties:
                id: { type: string, format: uuid }
                username: { type: string, nullable: true }
                name: { type: string, nullable: true }
                image: { type: string, nullable: true }

    Submission:
      type: object
      properties:
        id: { type: string, format: uuid }
        station_id: { type: integer, nullable: true }
        submitter_id: { type: string, format: uuid }
        status: { type: string, enum: [pending, approved, rejected] }
        type: { type: string, enum: [new, update, delete] }
        reviewer_id: { type: string, format: uuid, nullable: true }
        review_notes: { type: string, nullable: true }
        submitter_note: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        reviewed_at: { type: string, format: date-time, nullable: true }
    SubmissionCreateSingle:
      type: object
      properties:
        station_id: { type: integer, nullable: true }
        type: { type: string, enum: [new, update, delete] }
        submitter_note: { type: string, nullable: true }
        station:
          allOf:
            - $ref: "#/components/schemas/ProposedStationInsert"
          nullable: true
        location:
          allOf:
            - $ref: "#/components/schemas/ProposedLocationInsert"
          nullable: true
        sectors: { type: array, items: { $ref: "#/components/schemas/ProposedSectorInsert" }, nullable: true }
        cells: { type: array, items: { $ref: "#/components/schemas/ProposedCellInsert" }, nullable: true }
        pending_photos: { type: integer, nullable: true, description: "Number of photos expected to be uploaded after submission creation" }
        location_photo_ids:
          {
            type: array,
            items: { type: integer },
            maxItems: 50,
            nullable: true,
            description: "IDs of location photos the submitter wants assigned to the station",
          }
        location_photo_ids_to_remove:
          {
            type: array,
            items: { type: integer },
            maxItems: 50,
            nullable: true,
            description: "IDs of currently assigned station photos the submitter wants removed from the station",
          }
        main_location_photo_id:
          { type: integer, nullable: true, description: "ID from `location_photo_ids` to mark as the main station photo when approved" }
    ProposedStationInsert:
      type: object
      properties:
        operation: { type: string, enum: [add, update, delete], default: add }
        target_station_id: { type: integer, nullable: true }
        station_id: { type: string, nullable: true }
        operator_id: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        networks_id: { type: integer, nullable: true }
        networks_name: { type: string, nullable: true, maxLength: 150 }
        mno_name: { type: string, nullable: true, maxLength: 50 }
    ProposedLocationInsert:
      type: object
      required: [region_id, longitude, latitude]
      properties:
        region_id: { type: integer }
        city: { type: string, nullable: true }
        address: { type: string, nullable: true }
        longitude: { type: number }
        latitude: { type: number }
    ProposedSectorInsert:
      type: object
      required: [local_id, azimuth]
      properties:
        target_sector_id:
          { type: integer, nullable: true, description: "Existing station sector ID being retained or edited. Omit/null for a newly proposed sector" }
        local_id:
          { type: string, description: "Client-generated identifier used by proposed cells to reference this proposed sector before approval" }
        azimuth: { type: integer, minimum: 0, maximum: 359 }
    ProposedCellInsert:
      type: object
      properties:
        target_cell_id: { type: integer, nullable: true }
        station_id: { type: integer, nullable: true }
        band_id: { type: integer, nullable: true }
        target_sector_id: { type: integer, nullable: true, description: "Existing station sector ID to assign to the proposed cell" }
        sector_local_id: { type: string, nullable: true, description: "Local ID of a proposed sector to assign to the proposed cell" }
        sector_unassigned: { type: boolean, nullable: true, description: "When true, approval clears the cell sector assignment" }
        rat: { type: string, enum: [GSM, UMTS, LTE, NR], nullable: true }
        notes: { type: string, nullable: true }
        is_confirmed:
          { type: boolean, nullable: true, description: "Only respected when sent by an admin; regular submitters cannot self-confirm cells" }
        operation: { type: string, enum: [add, update, delete] }
        details:
          allOf:
            - $ref: "#/components/schemas/CellDetailsInsert"
          nullable: true
    SubmissionWithRelations:
      allOf:
        - $ref: "#/components/schemas/Submission"
        - type: object
          properties:
            station:
              allOf:
                - $ref: "#/components/schemas/Station"
              nullable: true
            submitter: { $ref: "#/components/schemas/UserPublic" }
            reviewer:
              allOf:
                - $ref: "#/components/schemas/UserPublic"
              nullable: true
            cells: { type: array, items: { $ref: "#/components/schemas/ProposedCellWithDetails" } }
            proposedStation:
              allOf:
                - $ref: "#/components/schemas/ProposedStation"
              nullable: true
    SubmissionFull:
      allOf:
        - $ref: "#/components/schemas/Submission"
        - type: object
          properties:
            station:
              allOf:
                - $ref: "#/components/schemas/Station"
              nullable: true
            submitter: { $ref: "#/components/schemas/UserFull" }
            reviewer:
              allOf:
                - $ref: "#/components/schemas/UserPublic"
              nullable: true
            proposedLocation:
              allOf:
                - $ref: "#/components/schemas/ProposedLocation"
              nullable: true
            proposedStation:
              allOf:
                - $ref: "#/components/schemas/ProposedStation"
              nullable: true
            sectors: { type: array, items: { $ref: "#/components/schemas/ProposedSector" } }
            cells: { type: array, items: { $ref: "#/components/schemas/ProposedCellWithDetails" } }
            locationPhotoSelections: { type: array, items: { $ref: "#/components/schemas/LocationPhotoSelection" } }
            locationPhotoRemovalSelections: { type: array, items: { $ref: "#/components/schemas/LocationPhoto" } }
    SubmissionWithCells:
      allOf:
        - $ref: "#/components/schemas/Submission"
        - type: object
          properties:
            sectors: { type: array, items: { $ref: "#/components/schemas/ProposedSector" } }
            cells: { type: array, items: { $ref: "#/components/schemas/ProposedCellWithDetails" } }
    SubmissionCreateResponse:
      allOf:
        - $ref: "#/components/schemas/Submission"
        - type: object
          properties:
            proposedStation:
              allOf:
                - $ref: "#/components/schemas/ProposedStation"
              nullable: true
            proposedLocation:
              allOf:
                - $ref: "#/components/schemas/ProposedLocation"
              nullable: true
            sectors: { type: array, items: { $ref: "#/components/schemas/ProposedSector" }, nullable: true }
            cells: { type: array, items: { $ref: "#/components/schemas/ProposedCellWithDetails" }, nullable: true }
            pending_photos: { type: integer, nullable: true, description: "Number of photos expected to be uploaded after submission creation" }
    SubmissionUpdate:
      type: object
      properties:
        review_notes: { type: string, nullable: true }
        submitter_note: { type: string, nullable: true }
        station:
          allOf:
            - $ref: "#/components/schemas/ProposedStationInsert"
          nullable: true
        location:
          allOf:
            - $ref: "#/components/schemas/ProposedLocationInsert"
          nullable: true
        sectors: { type: array, items: { $ref: "#/components/schemas/ProposedSectorInsert" }, nullable: true }
        cells: { type: array, items: { $ref: "#/components/schemas/ProposedCellUpdate" }, nullable: true }
    ProposedSector:
      type: object
      properties:
        id: { type: integer }
        submission_id: { type: string, format: uuid, nullable: true }
        target_sector_id: { type: integer, nullable: true }
        local_id: { type: string }
        azimuth: { type: integer, minimum: 0, maximum: 359 }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
    ProposedCellWithDetails:
      type: object
      properties:
        id: { type: integer }
        submission_id: { type: string, format: uuid }
        operation: { type: string, enum: [add, update, delete] }
        target_cell_id: { type: integer, nullable: true }
        station_id: { type: integer, nullable: true }
        band_id: { type: integer, nullable: true }
        target_sector_id: { type: integer, nullable: true }
        sector_local_id: { type: string, nullable: true }
        sector_unassigned: { type: boolean, nullable: true }
        rat: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        is_confirmed: { type: boolean, nullable: true }
        details:
          allOf:
            - $ref: "#/components/schemas/CellDetails"
          nullable: true
    ProposedCellUpdate:
      allOf:
        - $ref: "#/components/schemas/ProposedCellInsert"
    ProposedStation:
      type: object
      properties:
        id: { type: integer }
        submission_id: { type: string, format: uuid, nullable: true }
        operation: { type: string, enum: [add, update, delete] }
        target_station_id: { type: integer, nullable: true }
        station_id: { type: string, nullable: true }
        operator_id: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        networks_id: { type: integer, nullable: true }
        networks_name: { type: string, nullable: true }
        mno_name: { type: string, nullable: true }
        is_confirmed: { type: boolean, nullable: true }
        status: { type: string, enum: [published, inactive, pending] }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
    ProposedLocation:
      type: object
      properties:
        id: { type: integer }
        submission_id: { type: string, format: uuid, nullable: true }
        region_id: { type: integer }
        city: { type: string, nullable: true }
        address: { type: string, nullable: true }
        longitude: { type: number }
        latitude: { type: number }
        updatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
    UserPublic:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string, nullable: true }
        image: { type: string, nullable: true }
        username: { type: string, nullable: true }
    UserFull:
      type: object
      properties:
