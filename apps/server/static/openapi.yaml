        longitude: { type: number }
    UkeRadiolineSearchResult:
      type: object
      properties:
        id: { type: integer }
        permit_number: { type: string }
        operator:
          allOf:
            - $ref: "#/components/schemas/UkeOperator"
          nullable: true
        tx: { $ref: "#/components/schemas/UkeRadiolineEndpoint" }
        rx: { $ref: "#/components/schemas/UkeRadiolineEndpoint" }
    UkeRadiolineResponse:
      type: object
      properties:
        id: { type: integer }
        tx:
          type: object
          properties:
            longitude: { type: number }
            latitude: { type: number }
            height: { type: number }
            eirp: { type: number, nullable: true }
            antenna_attenuation: { type: number, nullable: true }
            transmitter: { type: object, nullable: true }
            antenna: { type: object, nullable: true }
        rx:
          type: object
          properties:
            longitude: { type: number }
            latitude: { type: number }
            height: { type: number }
            type: { type: object, nullable: true }
            gain: { type: number, nullable: true }
            height_antenna: { type: number, nullable: true }
            noise_figure: { type: number, nullable: true }
            atpc_attenuation: { type: number, nullable: true }
        link:
