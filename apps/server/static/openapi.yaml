          nullable: true
        location:
          allOf:
            - $ref: "#/components/schemas/UkeLocation"
          nullable: true
        permits:
          type: array
          items: { $ref: "#/components/schemas/UkePermitWithBand" }

    # Cell update schema
    CellUpdateWithId:
      type: object
      required: [cell_id]
      properties:
        cell_id: { type: integer }
        band_id: { type: integer }
        rat: { type: string, enum: [GSM, CDMA, UMTS, LTE, NR] }
        notes: { type: string, nullable: true }
        is_confirmed: { type: boolean, nullable: true }
        details:
          allOf:
            - $ref: "#/components/schemas/CellDetailsInsert"
          nullable: true

    # Extra identifiers schemas
    ExtraIdentificators:
      type: object
      properties:
        id: { type: integer }
        networks_id: { type: integer, nullable: true }
        networks_name: { type: string, nullable: true }
        mno_name: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ExtraIdentifiersPatch:
      type: object
      properties:
        networks_id: { type: integer, nullable: true }
        networks_name: { type: string, nullable: true, maxLength: 150 }
        mno_name: { type: string, nullable: true, maxLength: 50 }

    UkeImportJobStatus:
      type: object
      properties:
        state: { type: string, enum: [idle, running, success, error] }
        startedAt: { type: string, nullable: true }
        finishedAt: { type: string, nullable: true }
        steps:
          type: array
          items:
            type: object
            properties:
              key:
                {
                  type: string,
                  enum:
                    [
                      permits,
                      radiolines,
                      device_registry,
                      prune_deleted_entries,
                      prune_associations,
                      cleanup_orphaned_uke_entities,
                      associate,
                      snapshot,
                      cleanup,
                    ],
                }
              status: { type: string, enum: [pending, running, success, skipped, error] }
              startedAt: { type: string, nullable: true }
              finishedAt: { type: string, nullable: true }
        error: { type: string, nullable: true }

    # User Lists schemas
    UserListStations:
      type: object
      description: Station IDs grouped by source
      required: [internal, uke]
      properties:
        internal: { type: array, items: { type: integer }, description: Internal station IDs }
        uke: { type: array, items: { type: integer }, description: UKE location IDs }

    UserListSummary:
      type: object
      required: [id, uuid, name, is_public, stations, radiolines, stationCount, radiolineCount, createdBy, createdAt, updatedAt]
      properties:
        id: { type: integer }
        uuid: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        is_public: { type: boolean, nullable: true }
        stations: { $ref: "#/components/schemas/UserListStations" }
        radiolines: { type: array, items: { type: integer }, description: Array of radioline IDs }
        stationCount: { type: integer, description: "Total count: internal stations + UKE locations" }
        radiolineCount: { type: integer }
        createdBy:
          type: object
          required: [uuid]
          properties:
            uuid: { type: string, format: uuid }
            name: { type: string }
            username: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    UserListDetail:
      type: object
      required: [id, uuid, name, is_public, stations, radiolines, ukeLocations, createdAt, updatedAt]
      properties:
        id: { type: integer }
        uuid: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        is_public: { type: boolean, nullable: true }
        stations:
          type: array
          items: { $ref: "#/components/schemas/StationWithCellsAndOperator" }
          description: Full internal station objects
        radiolines:
          type: array
          items: { $ref: "#/components/schemas/UkeRadiolineResponse" }
        ukeLocations:
          type: array
          items: { $ref: "#/components/schemas/UkeLocationWithPermits" }
          description: Full UKE location objects with permits
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    UserListRecord:
      type: object
      description: Raw database record for a user list as returned by create/update operations
      required: [id, uuid, name, is_public, created_by, stations, radiolines, createdAt, updatedAt]
      properties:
        id: { type: integer }
        uuid: { type: string, format: uuid }
        name: { type: string }
        description: { type: string, nullable: true }
        is_public: { type: boolean, nullable: true }
        created_by: { type: string, format: uuid }
        stations: { $ref: "#/components/schemas/UserListStations" }
        radiolines: { type: array, items: { type: integer } }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    UserListCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        is_public: { type: boolean, nullable: true }
        stations: { $ref: "#/components/schemas/UserListStations" }
        radiolines: { type: array, items: { type: integer } }

    UserListPatch:
      type: object
      properties:
        name: { type: string }
        description: { type: string, nullable: true }
        is_public: { type: boolean, nullable: true }
        stations: { $ref: "#/components/schemas/UserListStations" }
        radiolines: { type: array, items: { type: integer } }
