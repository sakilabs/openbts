        - cells.create
        - cells.update
        - cells.delete
        - locations.create
        - locations.update
        - locations.delete
        - operators.create
        - operators.update
        - operators.delete
        - bands.create
        - bands.update
        - bands.delete
        - regions.create
        - regions.update
        - regions.delete
        - submissions.create
        - submissions.update
        - submissions.delete
        - submissions.approve
        - submissions.reject
        - settings.update
        - station_comments.create
        - station_comments.delete
        - user_lists.create
        - user_lists.update
        - user_lists.delete
        - uke_import.start
