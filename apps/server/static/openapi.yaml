            - $ref: "#/components/schemas/Operator"
          nullable: true
        location:
          allOf:
            - $ref: "#/components/schemas/UkeLocation"
          nullable: true
        permits:
          type: array
          items: { $ref: "#/components/schemas/UkeSearchPermit" }
    UkeRadiolineEndpoint:
